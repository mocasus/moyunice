name: Deploy MoyUNNES to GitHub Pages

# Auto-deploy setiap kali ada push ke branch main
on:
  push:
    branches: [main]
  # Bisa juga di-trigger manual dari tab Actions
  workflow_dispatch:

# Permission yang dibutuhkan untuk mempublish ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya jalankan satu deploy sekaligus; pembatalan otomatis bila ada commit baru
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Otomatis mengaktifkan GitHub Pages bila belum aktif di repo.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Seluruh repo adalah situs statis, jadi upload root.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
